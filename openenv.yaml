# openenv.yaml
# OpenEnv environment specification
# Compatible with: openenv validate

name: Advanced-Enterprise-Email-Triage-OpenEnv
version: "1.0.0"
description: >
  A production-grade enterprise email triage environment for AI agents.
  Tasks span single-email classification to complex mixed inboxes.

author: "OpenEnv Hackathon 2026 Submission"
license: MIT

# ── Environment endpoints ────────────────────────────────────────────────────
server:
  framework: fastapi
  host: "0.0.0.0"
  port: 7860
  endpoints:
    reset: { method: POST, path: /reset }
    step: { method: POST, path: /step }
    state: { method: GET, path: /state }
    health: { method: GET, path: /health }

# ── Action space ─────────────────────────────────────────────────────────────
action_space:
  type: structured
  schema: TriageAction

# ── Tasks ────────────────────────────────────────────────────────────────────
tasks:
  - id: easy
    name: "Morning Inbox Clear"
    max_steps: 5
  - id: medium
    name: "Batch Triage"
    max_steps: 15
  - id: hard
    name: "Threat Inbox"
    max_steps: 25

# ── Reward bounds ────────────────────────────────────────────────────────────
reward:
  min: 0.0
  max: 1.0
  normalised: true
  description: Dense per-action rewards clamped to [0.0, 1.0].

# ── Runtime constraints ──────────────────────────────────────────────────────
runtime:
  max_episode_minutes: 20
  cpu_cores: 2
  memory_gb: 8
  python_version: "3.11"
